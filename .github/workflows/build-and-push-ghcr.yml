name: Build and Push (GHCR)

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - '.github/workflows/build-and-push-ghcr.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Visibility: show exactly what the runner will send to Docker ----
      - name: Show manifests on runner
        run: |
          echo "=== package.json (HEAD on runner) ==="
          sed -n '1,200p' package.json || true
          echo "=== lockfile present? ==="
          test -f package-lock.json && echo "package-lock.json exists" || (echo "NO LOCKFILE" && exit 1)

      # ---- Guardrail: require a lockfile (npm ci needs it) ----
      - name: Ensure lockfile exists
        run: |
          test -f package-lock.json || (echo "Missing package-lock.json – run npm install and commit the lockfile" && exit 1)

      # ---- Guardrail: enforce the correct framework version ----
      - name: Validate framework version (^2.5.1)
        run: |
          grep -q '"webex-node-bot-framework": "\^2\.5\.1"' package.json \
          || (echo "package.json does not contain webex-node-bot-framework ^2.5.1"; sed -n '1,200p' package.json; exit 1)

      # ---- Use a lowercase image path to satisfy GHCR/Docker constraints ----
      - name: Compute lowercase image name
        id: prep
        shell: bash
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY,,}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "Using image: $IMAGE_NAME"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true         # (keep for this run to pull a fresh base image)
          no-cache: true     # (keep for this run to avoid stale layers; remove later)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}