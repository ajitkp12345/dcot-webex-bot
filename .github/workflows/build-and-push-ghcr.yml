# In the 'Build and push' step:
with:
  context: .
  push: true
  pull: true        # pull fresh base image
  no-cache: true    # disable cache for this run
  tags: ${{ steps.meta.outputs.tags }}
  labels: ${{ steps.meta.outputs.labels }}