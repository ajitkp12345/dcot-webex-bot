name: Build and Push (GHCR)

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - '.github/workflows/build-and-push-ghcr.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show manifests on runner
        run: |
          echo "=== package.json (HEAD on runner) ==="
          sed -n '1,200p' package.json
          echo "=== lockfile present? ==="
          test -f package-lock.json && echo "package-lock.json exists" || (echo "NO LOCKFILE" && exit 1)

      - name: Ensure lockfile exists
        run: |
          test -f package-lock.json || (echo "ERROR: Missing package-lock.json" && exit 1)

      - name: Validate framework version (^2.5.1)
        run: |
          grep -q '"webex-node-bot-framework": "\^2\.5\.1"' package.json \
          || (echo "WRONG FRAMEWORK VERSION"; sed -n '1,200p' package.json; exit 1)

      - name: Compute lowercase image name
        id: prep
        shell: bash
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY,,}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-build