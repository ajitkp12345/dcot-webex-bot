name: Register Webex Webhook (upsert)
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Register webhook
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          WEBHOOK_URL: ${{ vars.WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${BOT_TOKEN:-}" ] || [ -z "${WEBHOOK_URL:-}" ]; then
            echo "BOT_TOKEN (secret) and WEBHOOK_URL (repo variable) are required."; exit 1; fi
          # delete existing with same target (best-effort)
          curl -sS -H "Authorization: Bearer ${BOT_TOKEN}" https://webexapis.com/v1/webhooks \
            | jq -r '.items[]? | select(.targetUrl=="'"${WEBHOOK_URL}"'") | .id' \
            | xargs -r -n1 -I{} curl -sS -X DELETE -H "Authorization: Bearer ${BOT_TOKEN}" https://webexapis.com/v1/webhooks/{}
          # create new
          curl -sS -X POST https://webexapis.com/v1/webhooks \
            -H "Authorization: Bearer ${BOT_TOKEN}" -H "Content-Type: application/json" \
            -d '{"name":"Webex ACK Bot – messages created","targetUrl":"'"${WEBHOOK_URL}"'","resource":"messages","event":"created"}'
