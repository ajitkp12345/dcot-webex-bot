name: Deploy to Azure Web App (Container)
on:
  workflow_dispatch:
    inputs:
      webapp_name:
        description: 'Azure Web App name'
        required: true
      image_tag:
        description: 'Container tag to deploy (e.g., latest or a commit SHA)'
        required: true
permissions:
  contents: read
  packages: read
  id-token: write
env:
  REGISTRY: ghcr.io
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Compute lowercase image name
        id: prep
        shell: bash
        run: |
          IMAGE_NAME="${GITHUB_REPOSITORY,,}"
          echo "image_name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "Deploying image: $IMAGE_NAME:${{ github.event.inputs.image_tag }}"
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Configure Web App to pull from GHCR
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config container set \
              --name "${{ github.event.inputs.webapp_name }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --docker-custom-image-name "ghcr.io/${{ steps.prep.outputs.image_name }}:${{ github.event.inputs.image_tag }}" \
              --docker-registry-server-url "https://ghcr.io" \
              --docker-registry-server-user "${{ github.actor }}" \
              --docker-registry-server-password "${{ secrets.GITHUB_TOKEN }}"
      - name: Restart Web App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp restart \
              --name "${{ github.event.inputs.webapp_name }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}"
